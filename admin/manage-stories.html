<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Stories | Phoenix Admin</title>

<link rel="icon" href="../logo.png">
<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>
body{margin:0;background:#070707;color:#f5f0e6;font-family:Georgia,serif}
.header{display:flex;justify-content:space-between;align-items:center;padding:18px 7%;background:#050505;border-bottom:1px solid #222}
.brand{display:flex;align-items:center;gap:12px;text-decoration:none}
.brand img{width:50px}
.brand h2{color:#ffcc33;margin:0}
.container{max-width:1100px;margin:auto;padding:40px 7%}
.story-card-admin{background:#111;border:1px solid #292929;padding:22px;margin-bottom:18px}
.story-top{display:flex;gap:15px;align-items:center;margin-bottom:12px}
.avatar{width:62px;height:62px;border-radius:50%;object-fit:cover;border:2px solid #ffcc33;background:#222}
.avatar.default{display:flex;align-items:center;justify-content:center;color:#ffcc33;font-size:26px}
.story-card-admin h3{color:#ffcc33;margin:0}
.meta{color:#aaa;font-size:14px;margin:8px 0}
.desc{color:#cfc7b8;line-height:1.6}
.btn{display:inline-block;padding:10px 16px;border:none;cursor:pointer;font-weight:bold;margin:6px 6px 0 0;font-family:Georgia,serif;text-decoration:none}
.gold{background:#f0d27a;color:#170b05}
.red{background:#8b0000;color:white}
.dark{background:#222;color:white}
.status{margin:20px 0;color:#ffcc33}
</style>
</head>

<body>

<header class="header">
<a class="brand" href="dashboard.html">
<img src="../logo.png">
<h2>Manage Stories</h2>
</a>

<div>
<a class="btn dark" href="dashboard.html">Dashboard</a>
<a class="btn gold" href="new-story.html">+ New Story</a>
</div>
</header>

<div class="container">
<h1 style="color:#ffcc33">Stories Library</h1>
<p id="status" class="status">Loading stories...</p>
<div id="storiesList"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
getAuth,onAuthStateChanged,signOut,setPersistence,browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
import {
getFirestore,collection,getDocs,deleteDoc,doc,updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyAhb2Dfsyp4eCQ59-bSB3Xx1rzvVm9lHMs",
authDomain:"the-phoenix-whispers.firebaseapp.com",
projectId:"the-phoenix-whispers",
storageBucket:"the-phoenix-whispers.firebasestorage.app",
messagingSenderId:"60939247464",
appId:"1:60939247464:web:a6b49dc2cf938a939480dd",
measurementId:"G-JRTWDK1XVF"
};

const ADMIN_EMAIL="thephoenixwhispers.official@gmail.com";

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

await setPersistence(auth,browserLocalPersistence);

const statusBox=document.getElementById("status");
const storiesList=document.getElementById("storiesList");

onAuthStateChanged(auth,async user=>{
if(!user){location.href="index.html";return}
if(user.email!==ADMIN_EMAIL){await signOut(auth);location.href="index.html";return}
loadStories();
});

function shortText(text,limit=170){
return text && text.length>limit ? text.substring(0,limit)+"..." : (text||"");
}

function readTime(text){
const words=(text||"").trim().split(/\s+/).filter(Boolean).length;
return Math.max(1,Math.ceil(words/200));
}

async function loadStories(){
try{
const snap=await getDocs(collection(db,"stories"));
let stories=[];

snap.forEach(d=>stories.push({id:d.id,...d.data()}));

stories.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));

statusBox.innerText=stories.length+" story(s) found.";
storiesList.innerHTML="";

if(stories.length===0){
storiesList.innerHTML='<div class="story-card-admin"><p>No stories yet.</p></div>';
return;
}

stories.forEach(story=>{
const card=document.createElement("div");
card.className="story-card-admin";

const avatar=story.profilePhoto
? `<img class="avatar" src="${story.profilePhoto}" alt="Author">`
: `<div class="avatar default"><i class="fa-solid fa-user"></i></div>`;

card.innerHTML=`
<div class="story-top">
${avatar}
<div>
<h3>${story.title||"Untitled Story"}</h3>
<div class="meta">
<strong>Author:</strong> ${story.authorName||"Anonymous"} ·
<strong>Status:</strong> ${story.status||"draft"} ·
<strong>Category:</strong> ${story.category||"Story"} ·
<strong>Views:</strong> ${story.views||0} ·
<strong>Read:</strong> ${readTime(story.content)} min ·
<strong>Featured:</strong> ${story.featured ? "Yes" : "No"}
</div>
</div>
</div>

<p class="desc">${shortText(story.excerpt||story.content)}</p>

<a class="btn dark" href="../story-reader.html?id=${story.id}" target="_blank">Preview</a>

<a class="btn gold" href="edit-story.html?id=${story.id}">
<i class="fa-solid fa-pen"></i> Edit
</a>

<button class="btn dark" data-feature="${story.id}">
<i class="fa-solid fa-star"></i>
${story.featured ? " Remove Featured" : " Make Featured"}
</button>

<button class="btn red" data-delete="${story.id}">
<i class="fa-solid fa-trash"></i> Delete
</button>
`;

storiesList.appendChild(card);
});

document.querySelectorAll("[data-delete]").forEach(btn=>{
btn.addEventListener("click",async()=>{
if(!confirm("Delete this story permanently?"))return;
await deleteDoc(doc(db,"stories",btn.dataset.delete));
loadStories();
});
});

document.querySelectorAll("[data-feature]").forEach(btn=>{
btn.addEventListener("click",async()=>{
const id=btn.dataset.feature;
const story=stories.find(s=>s.id===id);
if(!story)return;

await updateDoc(doc(db,"stories",id),{
featured:!story.featured
});

loadStories();
});
});

}catch(error){
console.error(error);
statusBox.innerText="Failed to load stories. Check Firebase rules.";
}
}
</script>

</body>
</html>
