<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messages | Phoenix Admin</title>

<link rel="icon" href="../logo.png">
<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>
body{margin:0;background:#070707;color:#f5f0e6;font-family:Georgia,serif}
.header{display:flex;justify-content:space-between;align-items:center;padding:18px 7%;background:#050505;border-bottom:1px solid #222}
.brand{display:flex;align-items:center;gap:12px;text-decoration:none}
.brand img{width:50px}
.brand h2{color:#ffcc33;margin:0}
.container{max-width:1100px;margin:auto;padding:40px 7%}
.msg-card{
background:#111;
border:1px solid #292929;
padding:22px;
margin-bottom:18px;
}
.msg-card h3{margin:0;color:#ffcc33}
.meta{color:#aaa;font-size:14px;margin:8px 0}
.message{
background:#0b0b0b;
border:1px solid #222;
padding:15px;
margin:15px 0;
white-space:pre-wrap;
}
.btn{
padding:10px 16px;
border:none;
cursor:pointer;
font-weight:bold;
margin-right:8px;
font-family:Georgia,serif;
}
.red{background:#8b0000;color:#fff}
.dark{background:#222;color:#fff}
.status{margin:20px 0;color:#ffcc33}
</style>
</head>

<body>

<header class="header">
<a class="brand" href="dashboard.html">
<img src="../logo.png">
<h2>Phoenix Inbox</h2>
</a>

<a class="btn dark" href="dashboard.html">Dashboard</a>
</header>

<div class="container">

<h1 style="color:#ffcc33">Contact Messages</h1>

<p id="status" class="status">Loading...</p>

<div id="messages"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

import {
getAuth,
onAuthStateChanged,
signOut,
setPersistence,
browserLocalPersistence
}
from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

import {
getFirestore,
collection,
getDocs,
deleteDoc,
doc,
updateDoc
}
from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyAhb2Dfsyp4eCQ59-bSB3Xx1rzvVm9lHMs",
authDomain:"the-phoenix-whispers.firebaseapp.com",
projectId:"the-phoenix-whispers",
storageBucket:"the-phoenix-whispers.firebasestorage.app",
messagingSenderId:"60939247464",
appId:"1:60939247464:web:a6b49dc2cf938a939480dd",
measurementId:"G-JRTWDK1XVF"
};

const ADMIN_EMAIL="thephoenixwhispers.official@gmail.com";

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

await setPersistence(auth,browserLocalPersistence);

onAuthStateChanged(auth,async(user)=>{

if(!user){
location.href="index.html";
return;
}

if(user.email!==ADMIN_EMAIL){
await signOut(auth);
location.href="index.html";
return;
}

loadMessages();

});

async function loadMessages(){

const status=document.getElementById("status");
const box=document.getElementById("messages");

box.innerHTML="";

const snap=await getDocs(collection(db,"messages"));

let arr=[];

snap.forEach(d=>{

arr.push({
id:d.id,
...d.data()
});

});

arr.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));

status.innerText=arr.length+" message(s)";

if(arr.length===0){

box.innerHTML="<p>No messages.</p>";
return;

}

arr.forEach(m=>{

const div=document.createElement("div");

div.className="msg-card";

div.innerHTML=`

<h3>${m.subject||"No Subject"}</h3>

<div class="meta">

<b>${m.name}</b><br>

${m.email}<br>

Status :
<b>${m.status}</b>

</div>

<div class="message">

${m.message}

</div>

<button class="btn dark readBtn">Mark Read</button>

<button class="btn red deleteBtn">Delete</button>

`;

div.querySelector(".readBtn").onclick=async()=>{

await updateDoc(doc(db,"messages",m.id),{

status:"read"

});

loadMessages();

};

div.querySelector(".deleteBtn").onclick=async()=>{

if(confirm("Delete message?")){

await deleteDoc(doc(db,"messages",m.id));

loadMessages();

}

};

box.appendChild(div);

});

}

</script>

</body>
</html>
