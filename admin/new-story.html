<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Story | Phoenix Admin</title>

<link rel="icon" href="../logo.png">
<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>
.admin-shell{min-height:100vh;background:#070707;color:#f5f0e6}
.admin-header{display:flex;justify-content:space-between;align-items:center;padding:18px 7%;border-bottom:1px solid #222;background:#050505}
.admin-brand{display:flex;align-items:center;gap:12px}
.admin-brand img{width:52px}
.admin-brand h1{color:#ffcc33;font-size:24px;margin:0}
.admin-main{padding:45px 7%;max-width:1050px;margin:auto}
.story-form{background:#111;border:1px solid #292929;padding:32px;box-shadow:0 0 35px rgba(139,0,0,.18)}
.story-form input,.story-form select,.story-form textarea{
width:100%;padding:14px;margin:9px 0;background:#080808;border:1px solid #333;color:white;font-family:Georgia,serif
}
.story-form textarea{min-height:220px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.admin-btn{padding:13px 22px;background:#f0d27a;color:#170b05;border:none;font-weight:bold;cursor:pointer;font-family:Georgia,serif;margin-top:12px}
.admin-btn.red{background:#9b0000;color:white}
#status{color:#ffcc33;margin-top:16px}
@media(max-width:800px){.form-grid{grid-template-columns:1fr}}
</style>
</head>

<body>
<div class="admin-shell">

<header class="admin-header">
  <a class="admin-brand" href="dashboard.html">
    <img src="../logo.png" alt="Logo">
    <h1>Phoenix Admin</h1>
  </a>

  <button class="admin-btn red" id="logoutBtn">Logout</button>
</header>

<main class="admin-main">
  <span class="hero-label">Publish</span>
  <h2 style="font-size:42px;color:#ffcc33;margin:10px 0;">New Story</h2>

  <form class="story-form" id="storyForm">
    <div class="form-grid">
      <input type="text" id="title" placeholder="Story Title" required>
      <input type="text" id="authorName" placeholder="Author Name / Anonymous" required>
    </div>

    <div class="form-grid">
      <select id="category" required>
        <option value="">Select Category</option>
        <option>Hope</option>
        <option>Family</option>
        <option>Education</option>
        <option>Society</option>
        <option>Love</option>
        <option>Anonymous</option>
        <option>Personal</option>
        <option>Other</option>
      </select>

      <select id="statusField" required>
        <option value="published">Published</option>
        <option value="draft">Draft</option>
      </select>
    </div>

    <input type="url" id="imageUrl" placeholder="Cover Image URL / Google Drive image link optional">
    <input type="url" id="mediaUrl" placeholder="Audio / Video / PDF / Drive link optional">

    <textarea id="excerpt" placeholder="Short excerpt / preview" required></textarea>
    <textarea id="content" placeholder="Full story text" required></textarea>

    <button class="admin-btn" type="submit" id="publishBtn">
      <i class="fa-solid fa-paper-plane"></i> Publish Story
    </button>

    <p id="status"></p>
  </form>
</main>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "PASTE_YOUR_API_KEY_HERE",
  authDomain: "the-phoenix-whispers.firebaseapp.com",
  projectId: "the-phoenix-whispers",
  storageBucket: "the-phoenix-whispers.firebasestorage.app",
  messagingSenderId: "60939247464",
  appId: "PASTE_YOUR_APP_ID_HERE",
  measurementId: "G-JRTWDK1XVF"
};

const ADMIN_EMAIL = "thephoenixwhispers.official@gmail.com";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const storyForm = document.getElementById("storyForm");
const publishBtn = document.getElementById("publishBtn");
const statusBox = document.getElementById("status");
const logoutBtn = document.getElementById("logoutBtn");

let currentUser = null;

onAuthStateChanged(auth, (user) => {
  if(!user){
    window.location.href = "index.html";
    return;
  }

  if(user.email !== ADMIN_EMAIL){
    signOut(auth);
    window.location.href = "index.html";
    return;
  }

  currentUser = user;
});

logoutBtn.addEventListener("click", async () => {
  await signOut(auth);
  window.location.href = "index.html";
});

function makeSlug(text){
  return text.toLowerCase()
    .trim()
    .replace(/[^a-z0-9]+/g,"-")
    .replace(/^-+|-+$/g,"");
}

storyForm.addEventListener("submit", async (e) => {
  e.preventDefault();

  if(!currentUser){
    statusBox.innerText = "Login required.";
    return;
  }

  publishBtn.disabled = true;
  publishBtn.innerText = "Publishing...";
  statusBox.innerText = "";

  const title = document.getElementById("title").value.trim();

  const story = {
    title,
    slug: makeSlug(title),
    authorName: document.getElementById("authorName").value.trim(),
    category: document.getElementById("category").value,
    status: document.getElementById("statusField").value,
    imageUrl: document.getElementById("imageUrl").value.trim(),
    mediaUrl: document.getElementById("mediaUrl").value.trim(),
    excerpt: document.getElementById("excerpt").value.trim(),
    content: document.getElementById("content").value.trim(),
    createdBy: currentUser.email,
    createdAt: serverTimestamp(),
    updatedAt: serverTimestamp()
  };

  try{
    await addDoc(collection(db, "stories"), story);
    statusBox.innerText = "✅ Story saved successfully.";
    storyForm.reset();
  }catch(error){
    console.error(error);
    statusBox.innerText = "❌ Failed to save story. Check Firestore rules.";
  }

  publishBtn.disabled = false;
  publishBtn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Publish Story';
});
</script>

</body>
</html>
