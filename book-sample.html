  <script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyAhb2Dfsyp4eCQ59-bSB3Xx1rzvVm9lHMs",
authDomain:"the-phoenix-whispers.firebaseapp.com",
projectId:"the-phoenix-whispers",
storageBucket:"the-phoenix-whispers.firebasestorage.app",
messagingSenderId:"60939247464",
appId:"1:60939247464:web:a6b49dc2cf938a939480dd",
measurementId:"G-JRTWDK1XVF"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const params=new URLSearchParams(location.search);
const bookId=params.get("id");

const bookTitle=document.getElementById("bookTitle");
const bookAuthor=document.getElementById("bookAuthor");
const sampleBox=document.getElementById("sampleBox");
const buyButtons=document.getElementById("buyButtons");

function escapeHTML(str){
return String(str||"")
.replaceAll("&","&amp;")
.replaceAll("<","&lt;")
.replaceAll(">","&gt;");
}

function formatSample(text){
let safe=escapeHTML(text || "");

safe=safe
.replaceAll("&lt;h1&gt;","<h1>")
.replaceAll("&lt;/h1&gt;","</h1>")
.replaceAll("&lt;h2&gt;","<h2>")
.replaceAll("&lt;/h2&gt;","</h2>")
.replaceAll("&lt;h3&gt;","<h3>")
.replaceAll("&lt;/h3&gt;","</h3>")
.replaceAll("&lt;b&gt;","<b>")
.replaceAll("&lt;/b&gt;","</b>")
.replaceAll("&lt;i&gt;","<i>")
.replaceAll("&lt;/i&gt;","</i>");

return safe;
}

async function loadSample(){

if(!bookId){

bookTitle.innerText="Book Not Found";
bookAuthor.innerText="";
sampleBox.innerHTML="No book ID was provided.";
return;

}

try{

const snap=await getDoc(doc(db,"books",bookId));

if(!snap.exists()){

bookTitle.innerText="Book Not Found";
bookAuthor.innerText="";
sampleBox.innerHTML="This book does not exist or may have been removed.";
return;

}

const book=snap.data();

document.title=(book.title||"Read Sample")+" | The Phoenix Whispers";

bookTitle.innerText=book.title||"Untitled Book";
bookAuthor.innerText="By "+(book.author||"Vineet");

if(!book.sampleText){

sampleBox.innerHTML="Sample is not available for this book yet.";

return;

}

sampleBox.innerHTML=formatSample(book.sampleText);

buyButtons.innerHTML=`

${book.amazonPaperback ? `<a class="btn light" href="${escapeHTML(book.amazonPaperback)}" target="_blank">Buy Paperback</a>` : ""}

${book.amazonKindle ? `<a class="btn" href="${escapeHTML(book.amazonKindle)}" target="_blank">Buy Kindle</a>` : ""}

<a class="btn" href="books.html?id=${bookId}">Book Details</a>

`;

}
catch(error){

console.error(error);

bookTitle.innerText="Error";
bookAuthor.innerText="";
sampleBox.innerHTML="Could not load sample. Check Firebase rules.";

}

}

loadSample();

</script>
