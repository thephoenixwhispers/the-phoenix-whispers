<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Reader Profile | The Phoenix Whispers</title>

<link rel="stylesheet" href="style.css">

<style>

body{

background:#050505;
color:white;
font-family:Georgia,serif;
padding:60px;

}

.profile{

max-width:700px;
margin:auto;

background:#111;

padding:40px;

border-radius:16px;

border:1px solid #2d2d2d;

}

.profile img{

width:90px;

height:90px;

border-radius:50%;

display:block;

margin:auto;

margin-bottom:20px;

}

.profile h2{

text-align:center;

margin-bottom:8px;

}

.profile p{

text-align:center;

color:#bdbdbd;

}

.buttons{

margin-top:35px;

display:flex;

gap:15px;

justify-content:center;

flex-wrap:wrap;

}

button,a{

padding:12px 25px;

background:#8b0000;

border:none;

color:white;

border-radius:8px;

text-decoration:none;

cursor:pointer;

}

button:hover,

a:hover{

background:#b30000;

}

</style>

</head>

<body>

<div class="profile">

<img src="logo.png">

<h2 id="name">

Loading...

</h2>

<p id="email">

Loading...

</p>

<div class="buttons">

<a href="index.html">

Home

</a>

<button id="verifyBtn">

Verify Email

</button>

<button id="logoutBtn">

Logout

</button>

</div>

</div>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

import {

getAuth,

onAuthStateChanged,

signOut,

sendEmailVerification

}

from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

const firebaseConfig={

apiKey:"AIzaSyAhb2Dfsyp4eCQ59-bSB3Xx1rzvVm9lHMs",

authDomain:"the-phoenix-whispers.firebaseapp.com",

projectId:"the-phoenix-whispers",

storageBucket:"the-phoenix-whispers.firebasestorage.app",

messagingSenderId:"60939247464",

appId:"1:60939247464:web:a6b49dc2cf938a939480dd",

measurementId:"G-JRTWDK1XVF"

};

const app=initializeApp(firebaseConfig);

const auth=getAuth(app);

const name=document.getElementById("name");

const email=document.getElementById("email");

const verifyBtn=document.getElementById("verifyBtn");

const logoutBtn=document.getElementById("logoutBtn");

onAuthStateChanged(auth,user=>{

if(!user){

location.href="reader-login.html";

return;

}

name.textContent=user.displayName||"Reader";

email.textContent=user.email;

if(user.emailVerified){

verifyBtn.innerText="Email Verified ✓";

verifyBtn.disabled=true;

}

});

verifyBtn.onclick=async()=>{

if(auth.currentUser){

await sendEmailVerification(auth.currentUser);

alert("Verification email sent.");

}

};

logoutBtn.onclick=async()=>{

await signOut(auth);

location.href="index.html";

};

</script>

</body>

</html>
