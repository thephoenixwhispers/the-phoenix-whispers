<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reader Profile | The Phoenix Whispers</title>

<link rel="stylesheet" href="style.css">

<style>
#wishlistGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
margin-top:30px;
}

.wishlist-card{
background:#111;
border:1px solid #333;
padding:20px;
}

.wishlist-card h3{
color:#ffcc33;
margin-bottom:10px;
}

.wishlist-card p{
color:#d8cbb8;
margin-bottom:15px;
}

.wishlist-actions{
display:flex;
gap:10px;
flex-wrap:wrap;
}
</style>

</head>

<body>

<header>
<div class="top">
<a href="index.html" class="brand">
<img src="logo.png">
<h1>The Phoenix Whispers</h1>
</a>
</div>
</header>

<section class="section">

<div class="section-title">
<span>Reader</span>
<h2>My Profile</h2>
</div>

<div class="card">

<h3 id="readerName">Loading...</h3>

<p id="readerEmail"></p>

<div class="book-actions">

<a class="btn light" href="book-library.html">
Browse Books
</a>

<a class="btn light" href="stories.html">
Stories
</a>

<button class="btn" id="logoutBtn">
Logout
</button>

</div>

</div>

<div class="section-title" style="margin-top:60px;">
<span>Your Library</span>
<h2>Wishlist</h2>
</div>

<div id="wishlistGrid">

<div class="card">
Loading wishlist...
</div>

</div>

</section>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

import {
getAuth,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

import {
getFirestore,
collection,
getDocs,
doc,
getDoc,
deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyAhb2Dfsyp4eCQ59-bSB3Xx1rzvVm9lHMs",
authDomain:"the-phoenix-whispers.firebaseapp.com",
projectId:"the-phoenix-whispers",
storageBucket:"the-phoenix-whispers.firebasestorage.app",
messagingSenderId:"60939247464",
appId:"1:60939247464:web:a6b49dc2cf938a939480dd"
};

const app=initializeApp(firebaseConfig);

const auth=getAuth(app);

const db=getFirestore(app);

const readerName=document.getElementById("readerName");
const readerEmail=document.getElementById("readerEmail");
const logoutBtn=document.getElementById("logoutBtn");
const wishlistGrid=document.getElementById("wishlistGrid");

let currentUser=null;

onAuthStateChanged(auth,async(user)=>{

if(!user){

location.href="reader-login.html";

return;

}

currentUser=user;

readerName.innerText=user.displayName||"Reader";

readerEmail.innerText=user.email;

loadWishlist();

});

logoutBtn.onclick=async()=>{

await signOut(auth);

location.href="index.html";

};

async function loadWishlist(){

wishlistGrid.innerHTML="<div class='card'>Loading...</div>";

const snap=await getDocs(

collection(
db,
"users",
currentUser.uid,
"wishlist"
)

);

if(snap.empty){

wishlistGrid.innerHTML=`

<div class="card">

<h3>No Wishlist Yet</h3>

<p>Add books from Book Details page.</p>

</div>

`;

return;

}

wishlistGrid.innerHTML="";

for(const item of snap.docs){

const ref=doc(db,"books",item.id);

const bookSnap=await getDoc(ref);

if(!bookSnap.exists()) continue;

const book=bookSnap.data();

const card=document.createElement("div");

card.className="wishlist-card";

card.innerHTML=`

<h3>${book.title}</h3>

<p>${book.author||""}</p>

<div class="wishlist-actions">

<a
class="btn light"
href="book-detail.html?id=${item.id}">
Open
</a>

<button
class="btn removeBtn"
data-id="${item.id}">
Remove
</button>

</div>

`;

wishlistGrid.appendChild(card);

}

document.querySelectorAll(".removeBtn").forEach(btn=>{

btn.onclick=async()=>{

await deleteDoc(

doc(
db,
"users",
currentUser.uid,
"wishlist",
btn.dataset.id
)

);

loadWishlist();

};

});

}

</script>

</body>
</html>
