<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Create Account | The Phoenix Whispers</title>

<link rel="stylesheet" href="style.css">

<style>

body{
background:#050505;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
font-family:Georgia,serif;
}

.signup-box{
width:430px;
max-width:92%;
background:#111;
padding:40px;
border-radius:16px;
border:1px solid #2d2d2d;
}

.signup-box h2{
text-align:center;
color:white;
margin-bottom:25px;
}

.signup-box input{
width:100%;
padding:14px;
margin-bottom:18px;
background:#1b1b1b;
border:1px solid #333;
border-radius:8px;
color:white;
font-size:16px;
box-sizing:border-box;
}

.signup-box button{
width:100%;
padding:14px;
background:#8b0000;
border:none;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

.signup-box button:hover{
background:#a50000;
}

.links{
text-align:center;
margin-top:20px;
}

.links a{
color:#d5b16a;
text-decoration:none;
}

</style>

</head>

<body>

<div class="signup-box">

<h2>Create Reader Account</h2>

<input
id="name"
type="text"
placeholder="Full Name">

<input
id="email"
type="email"
placeholder="Email">

<input
id="password"
type="password"
placeholder="Password">

<button id="signupBtn">

Create Account

</button>

<div class="links">

<p>

<a href="reader-login.html">

Already have an account?

</a>

</p>

<p>

<a href="index.html">

← Back Home

</a>

</p>

</div>

</div>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

import {

getAuth,

createUserWithEmailAndPassword,

updateProfile,

sendEmailVerification

}

from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

const firebaseConfig={

apiKey:"AIzaSyAhb2Dfsyp4eCQ59-bSB3Xx1rzvVm9lHMs",

authDomain:"the-phoenix-whispers.firebaseapp.com",

projectId:"the-phoenix-whispers",

storageBucket:"the-phoenix-whispers.firebasestorage.app",

messagingSenderId:"60939247464",

appId:"1:60939247464:web:a6b49dc2cf938a939480dd",

measurementId:"G-JRTWDK1XVF"

};

const app=initializeApp(firebaseConfig);

const auth=getAuth(app);

document.getElementById("signupBtn").onclick=async()=>{

const name=document.getElementById("name").value.trim();

const email=document.getElementById("email").value.trim();

const password=document.getElementById("password").value;

try{

const userCredential=

await createUserWithEmailAndPassword(

auth,

email,

password

);

await updateProfile(

userCredential.user,

{

displayName:name

}

);

await sendEmailVerification(userCredential.user);

alert(

"Account created successfully.\n\nPlease verify your email before logging in."

);

location.href="reader-login.html";

}catch(e){

alert(e.message);

}

};

</script>

</body>
</html>
